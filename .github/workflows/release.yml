name: WASM Release

on:
  repository_dispatch:
    types: [core-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.2.0)'
        required: true
        type: string

jobs:
  prepare:
    name: Pin version, commit, tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      semver: ${{ steps.ver.outputs.semver }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MINIGRAF_RELEASE_TOKEN }}

      - id: ver
        run: |
          V="${{ github.event.client_payload.version || github.event.inputs.version }}"
          echo "tag=$V" >> "$GITHUB_OUTPUT"
          echo "semver=${V#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable

      - name: Wait for minigraf ${{ steps.ver.outputs.semver }} on crates.io
        run: |
          SEMVER="${{ steps.ver.outputs.semver }}"
          echo "Waiting for minigraf@$SEMVER on crates.io..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s "https://crates.io/api/v1/crates/minigraf/$SEMVER" \
              -H "User-Agent: minigraf-binding/1.0" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('version',{}).get('num',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "$SEMVER" ]; then
              echo "minigraf@$SEMVER is live (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/20: not yet available, waiting 15s..."
            sleep 15
          done
          echo "ERROR: minigraf@$SEMVER not found on crates.io after 5 minutes" >&2
          exit 1
      - name: Pin minigraf version in Cargo.toml
        run: |
          sed -i 's/^minigraf = "[^"]*"/minigraf = "=${{ steps.ver.outputs.semver }}"/' Cargo.toml
          sed -i 's/\(minigraf = {[^}]*version = \"\)[^\"]*/\1=${{ steps.ver.outputs.semver }}/' Cargo.toml

      - name: Update Cargo.lock
        run: cargo update --precise "${{ steps.ver.outputs.semver }}" minigraf

      - name: Commit and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          if ! git diff --cached --quiet; then
            git commit -m "chore: release ${{ steps.ver.outputs.tag }}"
          else
            echo "Cargo.toml already pinned, skipping commit"
          fi
          if ! git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            git tag "${{ steps.ver.outputs.tag }}"
          else
            echo "Tag ${{ steps.ver.outputs.tag }} already exists, skipping"
          fi
          git push origin main
          git push origin "${{ steps.ver.outputs.tag }}" || true

  publish-browser:
    name: Build and publish @minigraf/browser
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@minigraf/browser
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Build browser WASM
        run: wasm-pack build --target web --features browser
      - name: Stamp package name and version
        env:
          VERSION: ${{ needs.prepare.outputs.semver }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: VERSION '$VERSION' is not semver. Aborting."
            exit 1
          fi
          node -e "
            const fs = require('fs');
            const p = 'pkg/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.name = '@minigraf/browser';
            pkg.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish @minigraf/browser to npm
        working-directory: pkg
        run: npm publish --access public

  publish-wasi:
    name: Build and publish @minigraf/wasi
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@minigraf/wasi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          repository: project-minigraf/minigraf
          ref: v${{ needs.prepare.outputs.semver }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Build WASI binary
        run: cargo build --target wasm32-wasip1 --release --bin minigraf
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Check out wasm binding repo for wasi-pkg
        uses: actions/checkout@v4
        with:
          repository: project-minigraf/minigraf-wasm
          ref: ${{ needs.prepare.outputs.tag }}
          path: wasm-binding
      - name: Stage WASI wasm binary
        run: cp target/wasm32-wasip1/release/minigraf.wasm wasm-binding/wasi-pkg/minigraf-wasi.wasm
      - name: Stamp package version
        env:
          VERSION: ${{ needs.prepare.outputs.semver }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: VERSION '$VERSION' is not semver. Aborting."
            exit 1
          fi
          node -e "
            const fs = require('fs');
            const p = 'wasm-binding/wasi-pkg/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Test WASI package
        working-directory: wasm-binding/wasi-pkg
        run: npm test
      - name: Publish @minigraf/wasi to npm
        working-directory: wasm-binding/wasi-pkg
        run: npm publish --access public
